<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI管理系统 - 检测与管理所有AI组件</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI管理系统</h1>
            <p>自动检测并管理电脑上的所有AI组件</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">🔧</div>
                <div class="stat-value" id="serviceCount">0</div>
                <div class="stat-label">AI服务</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📁</div>
                <div class="stat-value" id="modelCount">0</div>
                <div class="stat-label">AI模型</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💻</div>
                <div class="stat-value" id="appCount">0</div>
                <div class="stat-label">AI应用</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚙️</div>
                <div class="stat-value" id="processCount">0</div>
                <div class="stat-label">AI进程</div>
            </div>
        </div>

        <div class="controls">
            <button id="scanBtn" class="btn btn-primary">🔍 开始扫描</button>
            <button id="refreshBtn" class="btn btn-secondary">🔄 刷新</button>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="services">AI服务</button>
            <button class="tab" data-tab="models">AI模型</button>
            <button class="tab" data-tab="apps">AI应用</button>
            <button class="tab" data-tab="processes">AI进程</button>
        </div>

        <div class="tab-content active" id="services">
            <div class="loading" id="servicesLoading">扫描中...</div>
            <div id="servicesList" class="item-list"></div>
        </div>

        <div class="tab-content" id="models">
            <div class="loading" id="modelsLoading">扫描中...</div>
            <div id="modelsList" class="item-list"></div>
        </div>

        <div class="tab-content" id="apps">
            <div class="loading" id="appsLoading">扫描中...</div>
            <div id="appsList" class="item-list"></div>
        </div>

        <div class="tab-content" id="processes">
            <div class="loading" id="processesLoading">扫描中...</div>
            <div id="processesList" class="item-list"></div>
        </div>

        <div class="resources-panel">
            <h3>📊 系统资源</h3>
            <div class="resource-bars">
                <div class="resource-item">
                    <label>CPU使用率</label>
                    <div class="progress-bar">
                        <div class="progress-fill" id="cpuBar" style="width: 0%"></div>
                    </div>
                    <span id="cpuText">0%</span>
                </div>
                <div class="resource-item">
                    <label>内存使用率</label>
                    <div class="progress-bar">
                        <div class="progress-fill" id="memBar" style="width: 0%"></div>
                    </div>
                    <span id="memText">0%</span>
                </div>
            </div>
            <div id="gpuInfo" class="gpu-info"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
